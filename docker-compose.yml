version: "3.9"

# ════════════════════════════════════════════
# GABOMAZONE — Architecture microservices
# Services : web, db, redis, celery-worker, celery-beat, nginx
# ════════════════════════════════════════════

x-django-env: &django-env
  DJANGO_SETTINGS_MODULE: project.settings
  SECRET_KEY: ${SECRET_KEY}
  DEBUG: ${DEBUG:-False}
  POSTGRES_DB: ${POSTGRES_DB:-gabomazone}
  POSTGRES_USER: ${POSTGRES_USER:-gabomazone}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
  POSTGRES_HOST: db
  POSTGRES_PORT: 5432
  REDIS_URL: redis://redis:6379/1
  CELERY_BROKER_URL: redis://redis:6379/0
  SINGPAY_API_KEY: ${SINGPAY_API_KEY:-}
  SINGPAY_API_SECRET: ${SINGPAY_API_SECRET:-}
  SINGPAY_MERCHANT_ID: ${SINGPAY_MERCHANT_ID:-}
  SINGPAY_DISBURSEMENT_ID: ${SINGPAY_DISBURSEMENT_ID:-}
  SINGPAY_ENVIRONMENT: ${SINGPAY_ENVIRONMENT:-sandbox}
  SINGPAY_PRODUCTION_DOMAIN: ${SINGPAY_PRODUCTION_DOMAIN:-gabomazone.com}
  SENDGRID_API_KEY: ${SENDGRID_API_KEY:-}
  EMAIL_SENDGRID: ${EMAIL_SENDGRID:-contact@gabomazone.com}
  ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1}

services:

  # ── Base de données PostgreSQL
  db:
    image: postgres:16-alpine
    container_name: gabomazone-db
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-gabomazone}
      POSTGRES_USER: ${POSTGRES_USER:-gabomazone}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD obligatoire}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gabomazone}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gabomazone-net

  # ── Cache / Message broker Redis
  redis:
    image: redis:7-alpine
    container_name: gabomazone-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gabomazone-net

  # ── Application Django principale
  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    container_name: gabomazone-web
    restart: unless-stopped
    environment:
      <<: *django-env
    volumes:
      - media_files:/app/media
      - static_files:/app/staticfiles
      - ./logs:/app/logs
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - gabomazone-net
    command: >
      sh -c "python manage.py migrate --noinput &&
      python manage.py collectstatic --noinput --clear &&
      gunicorn project.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 120 --access-logfile - --error-logfile - --log-level info"

  # ── Worker Celery (tâches asynchrones)
  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    container_name: gabomazone-celery-worker
    restart: unless-stopped
    environment:
      <<: *django-env
    volumes:
      - media_files:/app/media
      - ./logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - gabomazone-net
    command: celery -A project worker --loglevel=info --concurrency=2

  # ── Celery Beat (tâches planifiées)
  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    container_name: gabomazone-celery-beat
    restart: unless-stopped
    environment:
      <<: *django-env
    volumes:
      - ./logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - gabomazone-net
    command: celery -A project beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler

  # ── Nginx (reverse proxy + serveur fichiers statiques)
  nginx:
    image: nginx:1.25-alpine
    container_name: gabomazone-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - static_files:/app/staticfiles:ro
      - media_files:/app/media:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - web
    networks:
      - gabomazone-net

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  media_files:
    driver: local
  static_files:
    driver: local

networks:
  gabomazone-net:
    driver: bridge
