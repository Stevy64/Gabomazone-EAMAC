<!DOCTYPE html>
<html lang="fr">
<head>
   <meta Content-Type: text/html; charset="utf-8">
   <title>Réinitialisation de mot de passe</title>
</head>
<body>
<p>Bonjour,</p>
<p>Vous avez demandé la réinitialisation du mot de passe du compte lié à : <strong>{{ email }}</strong>.</p>
<p>Cliquez sur le lien ci-dessous pour définir un nouveau mot de passe :</p>
<p><a href="{{protocol}}://{{domain}}{% url 'accounts:password_reset_confirm' uidb64=uid token=token %}">Réinitialiser mon mot de passe</a></p>
<p>Si vous n'êtes pas à l'origine de cette demande, vous pouvez ignorer cet email.</p>
<p>L'équipe Gabomazone</p>
</body>
</html>
