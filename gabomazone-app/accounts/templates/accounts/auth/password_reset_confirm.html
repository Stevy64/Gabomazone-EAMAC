{% extends 'base.html' %}
{% load static %}

{% block body %}
<main class="main pages">
    <div class="page-header breadcrumb-wrap">
        <div class="container">
            <div class="breadcrumb">
                <a href="{%url 'home:index'%}" rel="nofollow"><i class="fi-rs-home mr-5"></i>Accueil</a>
                <span></span> Mon compte <span></span> Nouveau mot de passe
            </div>
        </div>
    </div>
    <div class="page-content pt-150 pb-150">
        <div class="container">
            <div class="row">
                <div class="col-xl-6 col-lg-8 col-md-12 m-auto">
                    <div class="row">
                        <div class="heading_s1">
                            <img class="border-radius-15" src="{% static 'assets/imgs/page/reset_password.svg'%}" alt="" />
                            <h2 class="mb-15 mt-15">Définir un nouveau mot de passe</h2>
                            <p class="mb-30">Choisissez un nouveau mot de passe sécurisé pour votre compte.</p>
                        </div>
                        <div class="col-lg-6 col-md-8">
                            <div class="login_wrap widget-taber-content background-white">
                                <div class="padding_eight_all bg-white">
                                    <form method="post">
                                        <div class="form-group">
                                            {% csrf_token %}
                                            {{ form.as_p }}
                                        </div>
                                        
                                        <div class="form-group">
                                            <button type="submit" class="btn btn-heading btn-block hover-up" name="login">Mettre à jour le mot de passe</button>
                                        </div>
                                    </form>
                                </div>
                            </div>
                        </div>
                        <!-- <div class="col-lg-6 pl-50">
                            <h6 class="mb-15">Password must:</h6>
                            <p>Be between 9 and 64 characters</p>
                            <p>Include at least tow of the following:</p>
                            <ol class="list-insider">
                                <li>An uppercase character</li>
                                <li>A lowercase character</li>
                                <li>A number</li>
                                <li>A special character</li>
                            </ol>
                        </div> -->
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>
{% endblock body %}
